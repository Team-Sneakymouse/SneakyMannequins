# SneakyMannequins Configuration

# Image storage and serving configuration
images:
  # Relative path from Minecraft server directory to store generated images
  # Default: ../web/images/ (relative to run/ directory)
  storage-path: "../web/images/"
  
  # URL prefix where images can be accessed by clients
  # Default: http://localhost:8080/images/
  url-prefix: "http://localhost:8080/images/"

# Plugin settings
plugin:
  # Enable debug logging
  debug: true
  
  # Default skin model for mannequins
  default-skin-model: "CLASSIC"

  preprocessing:
    # If true, sanitize/mask new layer PNGs on load (creates *_mask_*.png)
    enabled: true
    # Max number of color clusters (masks) to keep per image
    max-clusters: 3
    # Euclidean RGB distance threshold for grouping pixels into a cluster
    color-distance-threshold: 50
    # Minimum pixels required for a cluster to become a mask
    min-cluster-size: 3

# Layer configuration
layers:
  palettes:
    earth:
      stone: "5E503F"
      bark: "7A5C42"
      sand: "A67C52"
      dune: "C2A47B"
      clay: "E0C9A6"
    neon:
      hot_pink: "FF4D6D"
      cyan: "4DFFFF"
      lime: "7CFF4D"
      amber: "FFD24D"
      violet: "AA4DFF"
    skin:
      ivory: "F6E2CE"
      porcelain: "F2D6C5"
      sand: "E8C5AE"
      almond: "D9B08C"
      beige: "CFA07A"
      honey: "C28B67"
      caramel: "B3775A"
      chestnut: "9C6147"
      bronze: "8B503C"
      espresso: "6B3B2A"
      umber: "553023"

  # Rendering order for layers (top to bottom)
  order:
    - hair
    - shirt
    - pants
    - body

  definitions:
    hair:
      display-name: "Hair"
      directory: "layers/Hair"
      allow-color-mask: true
      default-palettes:
        - earth
        - neon
      # Optional per-option overrides:
      # options:
      #   fedora:
      #     palettes:
      #       - earth
    
    shirt:
      display-name: "Shirt"
      directory: "layers/Shirt"
      allow-color-mask: true
      default-palettes:
        - earth
        - neon
    
    pants:
      display-name: "Pants"
      directory: "layers/Pants"
      allow-color-mask: true
      default-palettes:
        - earth
        - neon
    
    body:
      display-name: "Body"
      directory: "layers/Body"
      allow-color-mask: true
      default-palettes: [skin]