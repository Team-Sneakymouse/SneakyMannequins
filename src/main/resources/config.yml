  # ── Texture definitions ──────────────────────────────────────────────
  # Named textures that control *how* a colour channel is rendered.
  # Each texture can have a blend map (RGB = sub-channel weights) and/or
  # an AO map (grayscale brightness modulation) and/or a roughness map
  # (grayscale saturation modulation).
  #
  # AO (ambient occlusion) modulates brightness on top of the original art:
  #   128 = neutral (no change), lower = darker, higher = brighter.
  #
  # Roughness modulates saturation on top of the original art:
  #   128 = neutral (no change), lower = less saturated, higher = more saturated.
  #
  # AO, roughness, and alpha can point to the same image file if you want
  # coupled modulation.  All maps are optional and independent.
  #
  # When a texture is selected, AO, roughness, and alpha apply to EVERY pixel
  # in the part — not just those covered by a colour mask channel.
  #
  # Textures are assigned at global, layer, or part level using a
  # `textures:` list (same hierarchy as palettes, but without first/last).
  # The reserved keyword "default" can be included in the list to enable
  # the "Default" option (flat colour, no texture).  If omitted, the
  # user must always have a texture selected.
  #
  # Example texture definitions:
  #   textures:
  #     wool:
  #       blend: "textures/wool_blend.png"
  #       ao: "textures/wool_ao.png"
  #       roughness: "textures/wool_roughness.png"
  #     denim:
  #       blend: "textures/denim_blend.png"
  #       ao: "textures/denim_detail.png"
  #       roughness: "textures/denim_detail.png"   # same file for both
  #     leather:
  #       ao: "textures/leather_ao.png"             # AO only, no blend
  #     ghostly:
  #       alpha: "textures/ghost_alpha.png"          # alpha only, no blend
  textures:
    striped:
      blend: "textures/blend_stripes_h.png"
      ao: "textures/ao_folds.png"
      roughness: "textures/roughness_grain.png"
    pinstripe:
      blend: "textures/blend_stripes_v.png"
      ao: "textures/ao_fabric.png"
      roughness: "textures/roughness_grain.png"
    checkered:
      blend: "textures/blend_checkerboard.png"
      ao: "textures/ao_vignette.png"
      roughness: "textures/roughness_grain.png"
    gradient:
      blend: "textures/blend_gradient.png"
      ao: "textures/ao_fabric.png"
      roughness: "textures/roughness_gradient.png"
    diagonal:
      blend: "textures/blend_gradient_diag.png"
      ao: "textures/ao_folds.png"
      roughness: "textures/roughness_grain.png"
    tricolor:
      blend: "textures/blend_three_stripes.png"
      ao: "textures/ao_folds.png"
      roughness: "textures/roughness_grain.png"
    worn:
      ao: "textures/ao_vignette.png"
      roughness: "textures/roughness_patchy.png"
    fabric:
      ao: "textures/ao_fabric.png"
      roughness: "textures/roughness_grain.png"
    faded:
      alpha: "textures/alpha_half.png"
    moth-eaten:
      alpha: "textures/alpha_scatter.png"

  # Rendering order for layers (bottom to top)
  order:
    - body
    - pants
    - shirt
    - hair

  definitions:
    # Default palette assignments – applied to ALL layers unless overridden.
    # Three categories processed in order: first → palettes → last.
    # Lower-level definitions (layer / part) fully replace higher-level ones
    # within the same category.  Duplicate palettes across categories are
    # collapsed (first occurrence wins).
    #
    # Each entry is either a plain palette id or a map with optional permission:
    #   - primary                         # available to everyone
    #   - palette: neon                   # same as above
    #     permission: group.admin         # only if player has this perm
    palettes-first: []
    palettes:
      - default                            # enables "Default" (no colour override) option
      - greyscale
    palettes-last: []

    # Default texture assignments – applied to ALL layers unless overridden.
    # Each entry is either a plain texture id or a map with optional permission:
    #   - wool                              # available to everyone
    #   - texture: leather                  # same as above
    #     permission: group.admin           # only if player has this perm
    # The reserved keyword "default" enables the "Default" (flat colour) option.
    textures:
      - default                            # enables "Default" (flat colour) texture option
      - worn
      - fabric

    # How much the picked color's saturation influences the final pixel.
    # 0.0 = saturation fully preserved from original art.
    # 1.0 = move the overall saturation towards the target (preserves variance).
    saturation-influence: 1.0

    # How much the picked colour's brightness influences the final pixel.
    # 0.0 = brightness fully preserved from original art (old behaviour).
    # 1.0 = full rescale towards picked colour's brightness (destroys shading).
    # Values around 0.2–0.4 shift the overall brightness region while keeping
    # the original shading contrast mostly intact.
    # Can be overridden per-layer or per-part (option) in their config sections.
    brightness-influence: 0.3

    hair:
      display-name: "Hair"
      directory: "layers/Hair"
      allow-color-mask: true
      # Layer-level palettes (overrides default-palettes for this layer)
      palettes:
        - default
        - hair
