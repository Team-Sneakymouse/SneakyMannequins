# SneakyMannequins Configuration

# Image storage and serving configuration
images:
  # Relative path from Minecraft server directory to store generated images
  # Default: ../web/images/ (relative to run/ directory)
  storage-path: "../web/images/"
  
  # URL prefix where images can be accessed by clients
  # Default: http://localhost:8080/images/
  url-prefix: "http://localhost:8080/images/"

# Plugin settings
plugin:
  # Enable debug logging
  debug: true
  
  # Default skin model for mannequins
  default-skin-model: "CLASSIC"

  preprocessing:
    # If true, sanitize/mask new layer PNGs on load (creates *_mask_*.png)
    enabled: true
    # Default masking strategy for splitting pixels into colour channels.
    # Available: HSB (k-means in hue/saturation/brightness — best all-rounder),
    #            HUE (largest hue gap — fast, good when colours are clearly different hues),
    #            RGB (k-means in RGB space — classic Euclidean colour distance)
    # Can be overridden per part with: /mannequin remask <strategy> <layer> <part>
    default-strategy: HSB
    # Pixels below this saturation (0.0-1.0) are considered neutral and excluded from masks
    # (catches greys, whites, near-whites whose hue is meaningless)
    neutral-saturation: 0.02
    # Pixels below this brightness (0.0-1.0) are considered too dark and excluded from masks
    # (catches blacks, near-blacks whose hue is unreliable)
    neutral-brightness-low: 0.10

# ── Rendering & Animation ─────────────────────────────────────────────────────
rendering:
  # Radius (blocks) at which a mannequin first appears for a player.
  view-radius: 8
  # Radius (blocks) within which a player continues to receive updates.
  # Players beyond this distance stop getting updates but the mannequin
  # remains visible until vanilla tracking distance despawns it.
  update-radius: 15

  # Settings for the first time a player sees a mannequin.
  first-seen:
    # INSTANT – all pixels in one burst.
    # BUILD   – bottom-to-top column animation (staggered, chaotic).
    mode: BUILD
    # Ticks between each column advance (BUILD mode only, 1 = every tick).
    tick-interval: 2
    # Per-column chance (0.0–1.0) to do nothing on a given tick,
    # adding organic randomness to the build-up.
    skip-chance: 0.5

  # Settings for when an already-visible mannequin is updated.
  update:
    mode: BUILD
    tick-interval: 1
    skip-chance: 0.5

# Command triggers – console commands executed when certain mannequin events occur.
# Available placeholders (replaced before dispatch):
#   {player}  – player name          {x} {y} {z} – mannequin location
#   {button}  – HUD button name      {layer}      – current layer key
#   {part}    – selected part name   {color}      – selected colour name
#   {channel} – selected channel #
# Leave a list empty or remove it to disable that trigger.
triggers:
  # Player's crosshair moves onto a HUD button
  hover:
    - "playsound minecraft:ui.button.click ambient {player} {x} {y} {z} 0.15 1.8"

  # Player clicks any HUD button
  click:
    - "playsound minecraft:ui.button.click ambient {player} {x} {y} {z} 0.2 2.0"

  # A new part is selected. Use the layer key for per-layer commands,
  # or "default" as a catch-all fallback.
  # Extra placeholders: {part} (display name), {layer}
  part-change:
    default:
      - "playsound minecraft:ui.button.click ambient {player} {x} {y} {z} 0.2 1.8"
    hair:
      - "playsound minecraft:entity.sheep.shear ambient {player} {x} {y} {z} 0.5 1.2"
      - "particle minecraft:poof {x} {y} {z} 0.2 0.3 0.2 0.02 5"
    shirt:
      - "playsound minecraft:item.armor.equip_leather ambient {player} {x} {y} {z} 0.5 1.1"
      - "particle minecraft:poof {x} {y} {z} 0.2 0.4 0.2 0.02 3"
    pants:
      - "playsound minecraft:item.armor.equip_leather ambient {player} {x} {y} {z} 0.5 0.8"
      - "particle minecraft:poof {x} {y} {z} 0.15 0.3 0.15 0.02 3"
    body:
      - "playsound minecraft:block.amethyst_block.chime ambient {player} {x} {y} {z} 0.6 1.0"
      - "particle minecraft:enchant {x} {y} {z} 0.3 0.5 0.3 0.5 10"

  # A colour is applied to a channel.
  # Extra placeholders: {color} (display name), {color_code} (hex e.g. #FF0000),
  #                     {color_r}, {color_g}, {color_b} (0.0–1.0 floats),
  #                     {layer}, {channel}
  color-change:
    - "playsound minecraft:item.dye.use ambient {player} {x} {y} {z} 0.5 1.2"
    - "particle dust{color:[{color_r},{color_g},{color_b}],scale:1.5} {x} {y} {z} 0.3 0.5 0.3 0 12"
    - "particle dust{color:[{color_r},{color_g},{color_b}],scale:0.7} {x} {y} {z} 0.15 0.8 0.15 0.1 8"

# HUD button configuration – controls the look and layout of each button.
# Text supports MiniMessage format codes: <white>, <yellow>, <bold>, <italic>,
# <font:minecraft:uniform>, <gradient:#AABB00:#CCDD00>, etc.
# Background colours are ARGB hex strings.
hud-buttons:
  # Global defaults (can be overridden per button)
  bg-default: "78000000"
  bg-highlight: "B8336699"

  status:
    # Use {message} as a placeholder for the dynamic status text.
    # The default message ("Controls") is shown when no action has occurred yet.
    text: "<white>{message}"
    default-message: "Controls"
    translation:
      x: 0.0
      y: 2.8
      z: -2.0
    line-width: 256

  model:
    text: "<white>Model"
    translation:
      x: -1.1
      y: 2.2
      z: -2.0

  pose:
    text: "<white>Pose"
    translation:
      x: -1.1
      y: 1.7
      z: -2.0

  random:
    text: "<white>Random"
    translation:
      x: -1.1
      y: 1.2
      z: -2.0

  layer:
    text: "<white>Layer"
    translation:
      x: 1.1
      y: 2.2
      z: -2.0

  part:
    text: "<white>Part"
    active-text: "<yellow>Part"
    translation:
      x: 1.1
      y: 1.7
      z: -2.0

  channel:
    text: "<white>Channel"
    disabled-text: "<gray>Channel"
    translation:
      x: 1.1
      y: 1.2
      z: -2.0

  color:
    text: "<white>Color"
    active-text: "<yellow>Color"
    translation:
      x: 1.1
      y: 0.7
      z: -2.0

# HUD frame – optional ItemDisplay rendered as a backdrop behind the HUD buttons.
# Rotates together with the rest of the HUD.  Disabled by default.
hud-frame:
  enabled: true
  # Minecraft item to display (any valid item ID, e.g. minecraft:glass_pane)
  item: "minecraft:glass_pane"
  # Custom model data (integer). Set to 0 or remove to use the default model.
  custom-model-data: 0
  # Item model transform context:
  #   NONE, THIRDPERSON_LEFTHAND, THIRDPERSON_RIGHTHAND,
  #   FIRSTPERSON_LEFTHAND, FIRSTPERSON_RIGHTHAND,
  #   HEAD, GUI, GROUND, FIXED
  display-context: "FIXED"
  # Translation offset (entity-local space, Y-rotated with the HUD)
  translation:
    x: 0.0
    y: 1.7
    z: -2.0
  # Scale
  scale:
    x: 3.0
    y: 3.0
    z: 0.05

